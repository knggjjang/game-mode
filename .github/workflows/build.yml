name: Build Game Mode

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: "Frontend"
            build: "npm run build"

          - os: windows-latest
            name: "Windows App"
            build: "npm run tauri build"

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust (Windows only)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust (Windows only)
        if: runner.os == 'Windows'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri"

      - name: Build Next.js frontend
        if: matrix.os == 'ubuntu-latest'
        run: npm run build

      - name: Build Tauri Windows app
        if: matrix.os == 'windows-latest'
        run: npm run tauri build

      - name: Upload frontend artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v3
        with:
          name: game-mode-frontend
          path: out/
          retention-days: 7

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest' && always()
        uses: actions/upload-artifact@v3
        with:
          name: game-mode-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      - name: List build outputs
        if: matrix.os == 'windows-latest'
        run: |
          echo "=== Build Outputs ==="
          if exist "src-tauri\target\release\bundle\msi" dir src-tauri\target\release\bundle\msi
          if exist "src-tauri\target\release\bundle\nsis" dir src-tauri\target\release\bundle\nsis
        shell: cmd
